<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day_6</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e8f0ff 0%, #f5f7ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1f2a44;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            padding: 36px 32px;
            box-shadow: 0 28px 80px rgba(26, 38, 87, 0.14);
            border: 1px solid rgba(79, 91, 213, 0.12);
        }
        h1 {
            margin: 0 0 24px;
            font-size: 2rem;
            text-align: center;
            color: #2f3d91;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #c8d1e5;
            margin-bottom: 16px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: #fbfbff;
        }
        input[type="text"]:focus {
            border-color: #5d75f2;
            box-shadow: 0 0 0 4px rgba(93, 117, 242, 0.12);
        }
        input[type="text"]::placeholder {
            color: #8c9ad6;
        }
        input[type="button"] {
            width: 100%;
            padding: 14px 0;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            color: #ffffff;
            background: linear-gradient(135deg, #4f5bd5 0%, #6d7ff9 100%);
            transition: background 0.2s ease, transform 0.1s ease;
        }
        input[type="button"]:hover {
            background: linear-gradient(135deg, #3d4ac3 0%, #5b6fed 100%);
        }
        input[type="button"]:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
