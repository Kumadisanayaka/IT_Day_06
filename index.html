<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day_6</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e8f0ff 0%, #f5f7ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1f2a44;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(26, 38, 87, 0.16);
        }
        h1 {
            margin: 0 0 24px;
            font-size: 2rem;
            text-align: center;
            color: #2f3d91;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #c8d1e5;
            margin-bottom: 16px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #5d75f2;
            box-shadow: 0 0 0 4px rgba(93, 117, 242, 0.12);
        }
        .result-box {
            background: #f4f7ff;
            padding: 18px 16px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .button-row {
            display: flex;
            gap: 12px;
        }
        input[type="button"] {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            color: #ffffff;
            background: #4f5bd5;
            transition: background 0.2s ease;
        }
        input[type="button"]:hover {
            background: #3d4ac3;
        }
        input[type="button"]:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <!----
    <input type="text" placeholder="Enter your name" id="inputText">
    <h1 id="heading">Customer Information</h1>
    <input type="button" value="change title" onclick="changeTitle()">
    
    <button type="button" value="change title" onclick="changeIncrement()">+</button>
    <button type="button" value="change title" onclick="changeDecrement()">-</button>-->

    <div class="container">
        <h1>Calculator</h1>
        <input type="text" placeholder="Enter first number" id="firstNumber">
        <input type="text" placeholder="Enter second number" id="secondNumber">
        <div id="result" class="result-box">Result: </div>
        <div class="button-row">
            <input type="button" value="Add" onclick="add()">
            <input type="button" value="Subtract" onclick="subtract()">
        </div>
    </div>

    <script src="/js/app.js"></script>

</body>
</html>
