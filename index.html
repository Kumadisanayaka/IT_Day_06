<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day_6</title>
    <style>
        :root {
            --bg-start: #eef3ff;
            --bg-end: #f9fbff;
            --surface: rgba(255, 255, 255, 0.96);
            --border: rgba(82, 96, 246, 0.22);
            --accent: #5565f7;
            --accent-dark: #3948d4;
            --text: #1f2949;
            --muted: #667195;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: radial-gradient(circle at top left, rgba(85, 101, 247, 0.18) 0%, transparent 32%),
                        radial-gradient(circle at bottom right, rgba(109, 124, 247, 0.16) 0%, transparent 28%),
                        linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border-radius: 28px;
            padding: 34px 30px;
            box-shadow: 0 28px 80px rgba(26, 38, 87, 0.12);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        h1 {
            margin: 0 0 22px;
            font-size: 2.1rem;
            text-align: center;
            color: #3441a5;
            letter-spacing: -0.03em;
        }
        input[type="text"] {
            width: 100%;
            padding: 16px 18px;
            border-radius: 16px;
            border: 1px solid rgba(103, 116, 255, 0.24);
            margin-bottom: 16px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: rgba(251, 252, 255, 0.96);
            color: var(--text);
        }
        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 6px rgba(85, 101, 247, 0.12);
        }
        input[type="text"]::placeholder {
            color: #8f9ad1;
        }
        input[type="button"],
        button {
            width: 100%;
            padding: 16px 0;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            color: #ffffff;
            background: linear-gradient(135deg, var(--accent) 0%, #6d7ff9 100%);
            transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
        }
        input[type="button"]:hover,
        button:hover {
            background: linear-gradient(135deg, var(--accent-dark) 0%, #5b6fed 100%);
            transform: translateY(-1px);
        }
        input[type="button"]:active,
        button:active {
            transform: translateY(1px);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            background: transparent;
        }
        table tr {
            border-bottom: 1px solid rgba(82, 96, 246, 0.12);
        }
        table tr:first-child {
            background: linear-gradient(135deg, var(--accent) 0%, #6d7ff9 100%);
            color: #ffffff;
            font-weight: 600;
        }
        table td {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.95rem;
        }
        table tr:hover:not(:first-child) {
            background: rgba(85, 101, 247, 0.08);
        }
    </style>
</head>
<body>
